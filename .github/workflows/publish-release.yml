name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.1.0 or v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Normalize version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: ${{ inputs.version }}" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Stop if tag already exists
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.version.outputs.tag }}" >&2
            exit 1
          fi

      - run: npm ci
      - run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
      - run: npm test
      - run: npm run build
      - run: mkdir -p release
      - run: npm pack --pack-destination release --ignore-scripts

      - name: Verify release package
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packages=(release/asx-*.tgz)
          if [[ ${#packages[@]} -ne 1 ]]; then
            echo "Expected exactly one ASX package in release/, found ${#packages[@]}." >&2
            exit 1
          fi
          tar -tzf "${packages[0]}" | grep -qx 'package/dist/cli.js'

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.tag }}" release/*.tgz --title "${{ steps.version.outputs.tag }}" --notes "Release ${{ steps.version.outputs.tag }}"
